<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 320px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            text-decoration: none;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            font-size: 16px;
            color: white;
            transition: 0.3s;
        }

        .login {
            background: #ff4b5c;
        }

        .register {
            background: #4CAF50;
        }

        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🚀 Open There 👇</h2>

    <a href="/login" class="btn login">Already Registered</a>
    <a href="/register" class="btn register">New Member</a>
</div>

</body>
</html>
