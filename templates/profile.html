<!DOCTYPE html>
<html>
<head>
<title>Profile</title>

<style>
body {
    background: #000;
    color: white;
    font-family: Arial;
}

.container {
    width: 70%;
    margin: auto;
}

.profile-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
}

.profile-pic {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: gray;
}

.posts {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.posts img, video {
    width: 100%;
}

/* buttons */
.btn {
    padding: 5px 10px;
    border-radius: 5px;
    text-decoration: none;
    margin-right: 5px;
    font-size: 14px;
}

.follow { background: pink; color: black; }
.unfollow { background: gray; color: white; }
.block { background: red; color: white; }
.unblock { background: green; color: white; }

</style>

</head>

<body>

<div class="container">

    <div class="profile-header">
        <div class="profile-pic"></div>

        <div>
            <h2>{{ username }}</h2>

            <p>{{ count }} posts</p>
            <p>👥 {{ followers }} followers | {{ following }} following</p>

            {% if session.get('user') != username %}
            
                <!-- FOLLOW -->
                <a class="btn follow" href="/follow/{{ username }}">Follow</a>

                <!-- UNFOLLOW -->
                <a class="btn unfollow" href="/unfollow/{{ username }}">Unfollow</a>

                <br><br>

                <!-- BLOCK -->
                <a class="btn block" href="/block/{{ username }}">Block</a>

                <!-- UNBLOCK -->
                <a class="btn unblock" href="/unblock/{{ username }}">Unblock</a>

            {% endif %}

        </div>
    </div>

    <div class="posts">
        {% for post in posts %}
            
            {% if post[1] %}
            <img src="{{ url_for('static', filename='uploads/' + post[1]) }}">
            {% endif %}

            {% if post[2] %}
            <video controls>
                <source src="{{ url_for('static', filename='uploads/' + post[2]) }}">
            </video>
            {% endif %}

        {% endfor %}
    </div>

</div>

</body>
</html>
